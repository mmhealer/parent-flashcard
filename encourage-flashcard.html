<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="같은 상황, 다른 언어 | 격려 플래시카드">
<meta property="og:description" content="4회차 부모교육 - 아이에게, 나에게 건네는 격려의 언어 플래시카드">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mmhealer.github.io/parent-flashcard/encourage-flashcard.html">
<title>같은 상황, 다른 언어 | 격려 플래시카드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Gowun+Batang&display=swap');

  :root{
    --bg1:#faf1ec;
    --bg2:#f3e2da;
    --accent:#a9714f;
    --accent-dark:#8d5c3d;
    --text-main:#3a2c22;
    --text-sub:#9c8172;
    --card-front:#fffdfb;
    --card-back:#fbeee1;
    --border:#ecd9cd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 8% 12%, rgba(200,150,120,0.10) 0%, transparent 40%),
      radial-gradient(circle at 92% 85%, rgba(200,150,120,0.12) 0%, transparent 45%),
      linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
    font-family:'Noto Sans KR', sans-serif;
    color:var(--text-main);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:48px 20px 64px;
  }
  .wrap{
    width:100%;
    max-width:620px;
  }
  header{
    text-align:center;
    margin-bottom:26px;
  }
  .eyebrow{
    font-size:13px;
    letter-spacing:0.14em;
    color:var(--accent);
    font-weight:700;
    margin-bottom:6px;
  }
  h1{
    font-size:26px;
    font-weight:900;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:13.5px;
    color:var(--text-sub);
  }

  .tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:22px 0 18px;
  }
  .tab-btn{
    border:1px solid var(--border);
    background:#fff;
    color:var(--accent-dark);
    font-family:inherit;
    font-size:14.5px;
    font-weight:700;
    padding:10px 20px;
    border-radius:999px;
    cursor:pointer;
    transition:all .2s ease;
  }
  .tab-btn.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }

  .progress-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:14px;
    font-size:13px;
    color:var(--text-sub);
  }
  .progress-track{
    flex:1;
    height:4px;
    background:var(--border);
    border-radius:2px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    border-radius:2px;
    transition:width .3s ease;
  }
  .shuffle-btn{
    background:none;
    border:none;
    color:var(--accent-dark);
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
  }
  .shuffle-btn:hover{ text-decoration:underline; }

  .stage{
    perspective:1600px;
    height:340px;
    margin-bottom:22px;
  }
  .card{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .card.flipped{
    transform:rotateY(180deg);
  }
  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:0 18px 40px -18px rgba(120,80,50,0.25);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:38px 34px;
  }
  .face-front{
    background:var(--card-front);
  }
  .face-back{
    background:var(--card-back);
    transform:rotateY(180deg);
  }
  .kicker{
    font-size:13px;
    color:var(--accent);
    font-weight:700;
    letter-spacing:.02em;
    margin-bottom:18px;
  }
  .situation-tag{
    font-size:12px;
    color:var(--text-sub);
    background:rgba(169,113,79,0.08);
    padding:4px 12px;
    border-radius:999px;
    margin-bottom:14px;
  }
  .main-line{
    font-family:'Gowun Batang', serif;
    font-size:20px;
    line-height:1.55;
    font-weight:700;
    color:var(--text-main);
    max-width:440px;
  }
  .prompt-line{
    margin-top:22px;
    font-size:13px;
    color:var(--text-sub);
  }
  .divider{
    width:60px;
    height:1px;
    background:var(--border);
    margin:20px 0;
  }
  .reason{
    font-size:13px;
    line-height:1.7;
    color:var(--text-sub);
    max-width:420px;
  }

  .controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .nav-btn{
    flex:1;
    background:#fff;
    border:1px solid var(--border);
    color:var(--accent-dark);
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    padding:13px 0;
    border-radius:14px;
    cursor:pointer;
    transition:opacity .2s ease;
  }
  .nav-btn:disabled{
    opacity:.35;
    cursor:default;
  }
  .flip-btn{
    flex:1.3;
    background:var(--accent);
    border:1px solid var(--accent);
    color:#fff;
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    padding:13px 0;
    border-radius:14px;
    cursor:pointer;
  }

  footer{
    text-align:center;
    margin-top:30px;
    font-size:11.5px;
    color:var(--text-sub);
    letter-spacing:.02em;
  }

  @media (max-width:480px){
    .stage{ height:390px; }
    .face{ padding:30px 22px; }
    .main-line{ font-size:18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">4회차 · 격려는 아이에게 날개를 준다</div>
    <h1>같은 상황, 다른 언어</h1>
    <div class="subtitle">몸앤맘힐러 · 감정으로 소통하는 향기로운 부모교실</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-cat="child">아이에게 (10)</button>
    <button class="tab-btn" data-cat="self">나에게 (10)</button>
  </div>

  <div class="progress-row">
    <span id="counter">1 / 10</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <button class="shuffle-btn" id="shuffleBtn">↺ 섞기</button>
  </div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face face-front">
        <div class="kicker">이렇게 말하고 싶을 때</div>
        <div class="situation-tag" id="tagFront"></div>
        <div class="main-line" id="harshLine"></div>
        <div class="prompt-line">격려의 언어로 표현해볼까요?</div>
      </div>
      <div class="face face-back">
        <div class="kicker">이렇게 말해볼 수 있어요</div>
        <div class="main-line" id="encourageLine"></div>
        <div class="divider"></div>
        <div class="reason" id="reasonLine"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="nav-btn" id="prevBtn">← 이전</button>
    <button class="flip-btn" id="flipBtn">뒤집기</button>
    <button class="nav-btn" id="nextBtn">다음 →</button>
  </div>

  <footer>카드를 눌러 뒤집어보세요 · 아들러 격려 원칙 기반</footer>
</div>

<script>
const DATA = {
  child: [
    { tag:"성적이 떨어졌을 때", harsh:"그럴 줄 알았어. 공부를 안 하니까 이 모양이지.", encourage:"속상하겠다. 그래도 포기하지 않고 끝까지 시험 본 것도 대단해.", reason:"결과보다 과정과 노력에 초점을 맞추면 아이는 실패 속에서도 다시 시도할 용기를 얻습니다." },
    { tag:"형제와 비교당할 때", harsh:"동생은 잘하는데 넌 왜 그러니?", encourage:"너는 너만의 속도로 잘하고 있어. 지난번보다 여기가 좋아졌네.", reason:"비교는 열등감을 키우지만, 개인의 성장에 초점을 두면 자기수용을 돕습니다." },
    { tag:"방 정리를 안 할 때", harsh:"맨날 이 모양이니. 도대체 몇 번을 말해야 알아듣겠어?", encourage:"스스로 정리하는 게 아직 익숙하지 않구나. 같이 해볼까?", reason:"반복적 지적은 존재 자체를 평가하는 말로 들립니다. 구체적 행동과 대안을 함께 제시해주세요." },
    { tag:"도전했다가 실패했을 때", harsh:"거봐, 안 될 거라고 했잖아.", encourage:"처음 해보는 거라 어려웠을 텐데 끝까지 해본 것 자체가 용기야.", reason:"결과가 아닌 시도한 용기를 격려하면 다음 도전을 두려워하지 않게 됩니다." },
    { tag:"친구와 다퉜을 때", harsh:"네가 뭘 잘못했길래 싸운 거야?", encourage:"친구랑 다퉈서 마음이 힘들었겠다. 어떤 부분이 제일 속상했어?", reason:"잘잘못을 먼저 따지기보다 감정을 먼저 공감해주면 아이는 마음을 열고 대화를 시작합니다." },
    { tag:"학원 가기 싫어할 때", harsh:"그러니까 평소에 미리미리 좀 하지.", encourage:"많이 힘든가 보구나. 엄마(아빠) 도움이 필요하면 언제든 말해줘.", reason:"훈계 대신 지지를 표현하면 아이는 스스로 해결할 힘을 얻습니다." },
    { tag:"약속을 어겼을 때", harsh:"넌 정말 믿을 수가 없어.", encourage:"이번엔 깜빡했구나. 다음엔 어떻게 하면 기억할 수 있을까?", reason:"신뢰를 부정하는 말 대신 함께 해결책을 찾는 질문이 책임감을 키웁니다." },
    { tag:"짜증을 낼 때", harsh:"왜 자꾸 짜증을 내고 그래!", encourage:"지금 많이 답답한가 보구나. 무슨 일인지 얘기해줄래?", reason:"감정 표현을 문제 행동으로 보지 않고 그대로 인정해주면 감정 조절을 배우게 됩니다." },
    { tag:"학교 가기를 거부할 때", harsh:"학교는 무조건 가야 하는 거야. 떼쓰지 마.", encourage:"오늘따라 학교 가기가 힘든가 보네. 무슨 걱정이 있는지 같이 얘기해볼까?", reason:"강요보다 이유를 함께 탐색하면 아이가 스스로 마음을 열 가능성이 높아집니다." },
    { tag:"좋은 성적을 받았을 때", harsh:"역시 넌 최고야! 우리 아이가 최고지!", encourage:"정말 열심히 준비했구나. 노력한 만큼 좋은 결과가 나와서 너도 기쁘겠다.", reason:"결과에 대한 평가(칭찬)보다 과정에 대한 인정(격려)이 아이의 내적 동기를 키웁니다." }
  ],
  self: [
    { tag:"아이에게 소리 지른 후", harsh:"난 정말 형편없는 부모야.", encourage:"오늘은 감정 조절이 어려웠어. 나도 최선을 다하고 있어.", reason:"자기 비난은 죄책감만 키웁니다. 완벽이 아닌 개선에 초점을 맞춰보세요." },
    { tag:"육아가 유난히 힘든 날", harsh:"나는 왜 이렇게 부족할까.", encourage:"오늘 하루도 애썼어. 잘 못한 날도 있고, 잘한 날도 있는 거지.", reason:"나에게도 격려가 필요합니다. 결과보다 애쓴 과정을 인정해주세요." },
    { tag:"다른 부모와 비교될 때", harsh:"저 부모는 저렇게 잘하는데 나는 왜...", encourage:"나에게는 나만의 속도와 방식이 있어.", reason:"비교는 낙담을 부릅니다. 자신의 강점에 집중하는 것이 격려의 시작입니다." },
    { tag:"아이에게 잘못 대응했을 때", harsh:"또 실수했어. 나는 계속 이래.", encourage:"이번 실수에서 배운 게 있으니 다음엔 다르게 해볼 수 있어.", reason:"실수는 성장의 기회입니다. 완벽주의 대신 배움의 태도를 선택해보세요." },
    { tag:"몸과 마음이 지쳤을 때", harsh:"나만 왜 이렇게 힘들지.", encourage:"지금 많이 지쳤구나. 나에게도 쉼이 필요해.", reason:"자기 감정을 억누르지 않고 인정하는 것이 회복의 첫걸음입니다." },
    { tag:"아이 문제행동을 내 탓할 때", harsh:"다 내가 잘못 키워서 그런 거야.", encourage:"지금 상황에서 내가 할 수 있는 것부터 하나씩 해보자.", reason:"자책은 문제 해결에 도움이 되지 않습니다. 지금 할 수 있는 행동에 집중해보세요." },
    { tag:"배운 걸 적용하지 못했을 때", harsh:"배운 대로 하나도 못했어. 난 안 되나 봐.", encourage:"오늘은 어려웠지만, 배운 걸 다시 시도해볼 기회는 또 있어.", reason:"한 번의 실패가 전체를 정의하지 않습니다. 나에게도 재도전의 기회를 주세요." },
    { tag:"감정적으로 예민해질 때", harsh:"내가 예민해서 문제야.", encourage:"내 감정도 소중해. 알아차린 것만으로도 잘하고 있는 거야.", reason:"자신의 감정을 있는 그대로 수용하는 것이 정서적 안정의 기초입니다." },
    { tag:"계획대로 되지 않았을 때", harsh:"이번에도 계획대로 안 됐어. 나는 왜 이 모양이지.", encourage:"예상과 달랐지만, 그 안에서도 배운 게 있을 거야.", reason:"완벽한 계획보다 유연한 태도가 지속가능한 육아를 만듭니다." },
    { tag:"하루를 마무리할 때", harsh:"오늘도 부족한 하루였어.", encourage:"오늘 하루도 아이를 위해 애쓴 나에게 고마워.", reason:"하루의 끝에 나를 격려하는 습관이 다음 날을 살아갈 힘이 됩니다." }
  ]
};

let currentCat = "child";
let order = DATA[currentCat].map((_,i)=>i);
let idx = 0;
let flipped = false;

const cardEl = document.getElementById('card');
const tagFront = document.getElementById('tagFront');
const harshLine = document.getElementById('harshLine');
const encourageLine = document.getElementById('encourageLine');
const reasonLine = document.getElementById('reasonLine');
const counter = document.getElementById('counter');
const progressFill = document.getElementById('progressFill');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const flipBtn = document.getElementById('flipBtn');
const shuffleBtn = document.getElementById('shuffleBtn');
const tabBtns = document.querySelectorAll('.tab-btn');

function render(){
  const list = DATA[currentCat];
  const item = list[order[idx]];
  tagFront.textContent = item.tag;
  harshLine.textContent = item.harsh;
  encourageLine.textContent = item.encourage;
  reasonLine.textContent = item.reason;
  counter.textContent = (idx+1) + " / " + list.length;
  progressFill.style.width = ((idx+1)/list.length*100) + "%";
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === list.length - 1;
  cardEl.classList.remove('flipped');
  flipped = false;
}

function flip(){
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function goPrev(){ if(idx>0){ idx--; render(); } }
function goNext(){ if(idx < DATA[currentCat].length-1){ idx++; render(); } }

function shuffle(){
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
  idx = 0;
  render();
}

function switchCat(cat){
  currentCat = cat;
  order = DATA[cat].map((_,i)=>i);
  idx = 0;
  tabBtns.forEach(b=>b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

cardEl.addEventListener('click', flip);
flipBtn.addEventListener('click', flip);
prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);
shuffleBtn.addEventListener('click', shuffle);
tabBtns.forEach(b => b.addEventListener('click', ()=>switchCat(b.dataset.cat)));

render();
</script>
</body>
</html>
